stages:
  - test
  - deploy

test:
  stage: test
  image: node:20
  # poppler-utils: pdftocairo/pdftotext. djvulibre-bin: DjVu. p7zip-full: 7z (CB7).
  # mupdf-tools: mutool (PDF outline / table of contents).
  before_script:
    - apt-get update && apt-get install -y poppler-utils djvulibre-bin p7zip-full mupdf-tools
    - npm ci
  script:
    - npm run build
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r site/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - site/**/*
        - .gitlab-ci.yml
